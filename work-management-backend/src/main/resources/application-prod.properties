# =====================================================
# SERVER
# =====================================================
server.port=${PORT:10000}

# =====================================================
# DATABASE - PostgreSQL (production)
# Các env vars cần set trên Render:
#   DB_HOST     = hostname của Render Postgres (vd: dpg-xxxx-a.oregon-postgres.render.com)
#   DB_PORT     = 5432
#   DB_NAME     = tên database
#   DB_USERNAME = username
#   DB_PASSWORD = password
# =====================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# JPA/HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =====================================================
# CORS
# Env var cần set trên Render:
#   FRONTEND_URL = https://your-app.vercel.app
# =====================================================
app.cors.allowed-origins=${FRONTEND_URL:https://work-management-application.vercel.app}

# =====================================================
# LOGGING (prod - tối giản)
# =====================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
