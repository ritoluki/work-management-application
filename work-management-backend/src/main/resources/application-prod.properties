# =====================================================
# SERVER
# =====================================================
server.port=${PORT:10000}

# =====================================================
# DATABASE - PostgreSQL (production)
# Các env vars cần set trên Render:
#   DB_HOST     = hostname (vd: dpg-xxxx-a.oregon-postgres.render.com)
#   DB_PORT     = 5432
#   DB_NAME     = tên database
#   DB_USERNAME = username
#   DB_PASSWORD = password
# =====================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JPA/HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false

# =====================================================
# CORS
# Env var cần set trên Render:
#   FRONTEND_URL = https://your-app.vercel.app
# =====================================================
app.cors.allowed-origins=${FRONTEND_URL:https://work-management-application.vercel.app}

# =====================================================
# APP FLAGS
# =====================================================
app.seed-data=false

# =====================================================
# LOGGING
# =====================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
