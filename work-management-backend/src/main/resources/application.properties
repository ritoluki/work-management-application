# =====================================================
# ACTIVE PROFILE: dev (override bằng SPRING_PROFILES_ACTIVE=prod)
# =====================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =====================================================
# SERVER
# =====================================================
server.port=8080

# =====================================================
# DATABASE - MySQL (dev)
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3308/work_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA/HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =====================================================
# CORS - giá trị này được đọc bởi CorsConfig.java
# Dùng dấu phẩy để cho phép nhiều origin: http://localhost:3000,http://localhost:3001
# =====================================================
app.cors.allowed-origins=http://localhost:3000

# =====================================================
# APP FLAGS
# =====================================================
app.seed-data=false

# =====================================================
# ERROR RESPONSE - hiện message trong response body (dev only)
# =====================================================
server.error.include-message=always
server.error.include-binding-errors=always

# =====================================================
# LOGGING (dev - verbose)
# =====================================================
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
